appname = wxapi
httpaddr = "0.0.0.0"
codeaddr = "127.0.0.1"
httpport = 8062
# 扫码网页独立端口（与 Swagger/API 分离）。填 0 则关闭独立监听，仅保留主服务 /scanlogin/。
scanloginhttpport = 8063
runmode = dev
viewspath = "template"
autorender = false
copyrequestbody = true
EnableDocs = true
redislink = 127.0.0.1:6379
redispass = ""
redisdbnum = 2

# API Key（小范围出售）：apikeyenforce=true 时，/api/* 需在请求头带 X-API-Key 或 Bearer。合法 Key 放在 Redis SET：SADD <apikeysrediskey> <密钥>
apikeyenforce = true
apikeysrediskey = wxapi:api:keys


syncmessage = true
# 业务消息全量 POST 到 syncmessagebusinessuri 时需 msgpush=true。cmdchat 微信指令在 cmdchat_enabled=true 时仍会 Msg.Sync（可与 msgpush 独立）。
msgpush = false
syncmessagebusinessuri = "http://127.0.0.1:8088/msg/SyncMessage/{0}"

# 微信内指令：多个前缀只用英文半角逗号 , 分隔（不要用中文逗号，不要连续 ,, 否则会少解析）。示例： 。,.,#
cmdchat_enabled = false
cmdchat_prefix = 。,.,#
cmdchat_sessions = pm,filehelper
cmdchat_owner_code = 888
cmdchat_invite_ttl_secs = 600
# NewSync Continue!=0 时最多再拉几轮，把后续 AddMsg 拉全（不配或 <=0 默认 12）
cmdchat_sync_drain_max = 12
logoutbusinessuri = ""

sessionon = true

SessionName = "wxapi"
ServerName = "wxapi"

# Linux 下 main 会启 epoll 长连；与自动心跳（登录后 AutoHeartBeat）配合收消息、走长连心跳。
longlinkenabled = true
longlinkconnecttimeout = "30m"
# 长连心跳失败：发包/解包/业务 ret 非 0 会 Remove 连接后重试次数与间隔（毫秒）
longlink_heartbeat_retries = 3
longlink_heartbeat_retry_delay_ms = 800
# 保留配置项，当前代码不再用自动二次登录救活长连。
longlink_recover_before_stop = false

rabbitmq = false
rabbitmqurl = "amqp://guest:guest@10.10.11.7:5672/"
rabbitmqexchange = "wxapi"

ocrurl = ""
ocrurlgo= "http://47.119.158.126:5550/unban?tick="
ocrurlhgo="http://47.119.158.126:5550/unbanlife?huaKuaiUrl="
